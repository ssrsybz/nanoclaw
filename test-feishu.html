<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw 飞书测试</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #3370ff; }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #52c41a;
    }
    .status-dot.offline { background: #ff4d4f; }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    textarea { min-height: 100px; font-family: monospace; }
    button {
      background: #3370ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2860e1; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .log {
      background: #1a1a1a;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .info { color: #69c0ff; }
    .warn { color: #ffc53d; }
    .error { color: #ff7875; }
  </style>
</head>
<body>
  <h1>🤖 NanoClaw 飞书渠道测试</h1>

  <div class="card">
    <h2>服务状态</h2>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">检查中...</span>
    </div>
  </div>

  <div class="card">
    <h2>配置信息</h2>
    <p><strong>App ID:</strong> <code id="appId">-</code></p>
    <p><strong>WebSocket:</strong> <span id="wsStatus">未连接</span></p>
    <p><strong>默认触发词:</strong> <code>@Andy</code></p>
  </div>

  <div class="card">
    <h2>模拟发送消息</h2>
    <p>
      <label>Chat JID:</label>
      <input type="text" id="chatJid" placeholder="fs:p2p:ou_xxx 或 fs:group:oc_xxx">
    </p>
    <p>
      <label>消息内容:</label>
      <textarea id="messageContent" placeholder="输入消息内容...">@Andy 你好</textarea>
    </p>
    <p>
      <button onclick="sendTestMessage()">发送测试消息</button>
      <button onclick="clearLogs()">清空日志</button>
    </p>
  </div>

  <div class="card">
    <h2>事件日志</h2>
    <div class="log" id="logPanel">等待事件...</div>
  </div>

  <div class="card">
    <h2>使用说明</h2>
    <ol>
      <li>在飞书中给机器人发送消息</li>
      <li>查看下方的日志面板，找到 Chat JID</li>
      <li>复制 JID 到上方的输入框</li>
      <li>使用 <code>npx tsx setup/index.ts --step register</code> 注册渠道</li>
    </ol>
  </div>

  <script>
    const logPanel = document.getElementById('logPanel');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const appIdSpan = document.getElementById('appId');
    const wsStatus = document.getElementById('wsStatus');

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${time}] ${msg}`;
      logPanel.appendChild(line);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function clearLogs() {
      logPanel.innerHTML = '';
      log('日志已清空');
    }

    // 检查服务状态
    async function checkStatus() {
      try {
        // 尝试读取日志文件
        const res = await fetch('/logs/nanoclaw.log');
        if (res.ok) {
          statusDot.classList.remove('offline');
          statusText.textContent = '运行中';
          log('服务状态: 运行中', 'info');
        }
      } catch (e) {
        statusDot.classList.add('offline');
        statusText.textContent = '离线';
        log('无法连接到服务', 'error');
      }
    }

    // 模拟发送消息（仅用于演示）
    function sendTestMessage() {
      const jid = document.getElementById('chatJid').value;
      const content = document.getElementById('messageContent').value;

      if (!jid) {
        log('请输入 Chat JID', 'warn');
        return;
      }

      log(`模拟发送到 ${jid}: ${content}`, 'info');
      log('提示: 这是模拟测试，实际消息需要通过飞书客户端发送', 'warn');

      // 显示注册命令
      const name = jid.includes('p2p') ? '飞书私聊' : '飞书群聊';
      const folder = jid.includes('p2p') ? 'feishu_main' : 'feishu_group';

      log('\n注册命令:', 'info');
      log(`npx tsx setup/index.ts --step register -- --jid "${jid}" --name "${name}" --folder "${folder}" --channel feishu --no-trigger-required --is-main`);
    }

    // 初始化
    log('NanoClaw 飞书测试面板已加载');
    log('请在飞书客户端中给机器人发送消息来获取 Chat JID');

    // 显示部分 App ID
    appIdSpan.textContent = 'cli_a9412d***dbc4';

    // 检查日志更新
    let lastLogSize = 0;
    async function pollLogs() {
      try {
        const res = await fetch('/logs/nanoclaw.log');
        if (res.ok) {
          const text = await res.text();
          if (text.length > lastLogSize) {
            const newContent = text.slice(lastLogSize);
            const lines = newContent.split('\n').filter(l => l.trim());
            lines.forEach(line => {
              if (line.includes('Feishu')) {
                log(line, line.includes('ERROR') ? 'error' : 'info');
              }
              if (line.includes('chatJid') || line.includes('fs:')) {
                log(line, 'warn');
              }
            });
            lastLogSize = text.length;
          }
        }
      } catch (e) {
        // 日志文件不可访问
      }
    }

    setInterval(pollLogs, 2000);
  </script>
</body>
</html>
